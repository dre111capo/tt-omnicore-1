# Tiny Tapeout project information
project:
  title:        "OmniCore-1"      # Project title
  author:       "Andrea Dotto"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "64-bit Parallel IMC BNN Accelerator Core"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_omnicore"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "tt_um_omnicore.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "wbs_stb_i"
  ui[1]: "wbs_cyc_i"
  ui[2]: "wbs_we_i"
  ui[3]: "wbs_adr_i[0]"
  ui[4]: "wbs_adr_i[1]"
  ui[5]: "wbs_adr_i[2]"
  ui[6]: "wbs_adr_i[3]"
  ui[7]: "wbs_adr_i[4]"

  # Outputs
  uo[0]: "wbs_ack_o"
  uo[1]: "popcount[0]"
  uo[2]: "popcount[1]"
  uo[3]: "popcount[2]"
  uo[4]: "popcount[3]"
  uo[5]: "popcount[4]"
  uo[6]: "popcount[5]"
  uo[7]: "popcount[6]"

  # Bidirectional pins
  uio[0]: "wbs_dat[0]"
  uio[1]: "wbs_dat[1]"
  uio[2]: "wbs_dat[2]"
  uio[3]: "wbs_dat[3]"
  uio[4]: "wbs_dat[4]"
  uio[5]: "wbs_dat[5]"
  uio[6]: "wbs_dat[6]"
  uio[7]: "wbs_dat[7]"

# Do not change!
yaml_version: 6
